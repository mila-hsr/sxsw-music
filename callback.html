<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SXSW Music - Spotify Auth</title>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #0a0a0a; color: #f5f5f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { text-align: center; max-width: 500px; padding: 40px; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; }
        h1 { color: #c8ff00; margin-bottom: 20px; }
        .code { background: #0a0a0a; padding: 15px; border-radius: 4px; font-family: monospace; font-size: 14px; word-break: break-all; margin: 20px 0; border: 1px solid #2a2a2a; user-select: all; }
        .btn { background: #c8ff00; color: #0a0a0a; border: none; padding: 12px 24px; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: 600; }
        .btn:hover { background: #f5f5f0; }
        .error { color: #ff6b35; }
        .success { color: #c8ff00; }
        p { color: #888; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 SXSW Music</h1>
        <div id="content">Processing...</div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const content = document.getElementById('content');
        
        if (error) {
            content.innerHTML = `<p class="error">❌ Authorization denied: ${error}</p><p>Close this tab and try again.</p>`;
        } else if (code) {
            content.innerHTML = `
                <p class="success">✅ Authorization successful!</p>
                <p>Copy this code and paste it back in the terminal:</p>
                <div class="code" id="authCode">${code}</div>
                <button class="btn" onclick="navigator.clipboard.writeText('${code}');this.textContent='✅ Copied!'">📋 Copy Code</button>
                <p style="margin-top:20px;font-size:0.85em;">You can close this tab after copying.</p>
            `;
        } else {
            content.innerHTML = `<p class="error">❌ No authorization code received.</p><p>Try the auth flow again.</p>`;
        }
    </script>
</body>
</html>
